name: Daily Pet Health Article

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate-article:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start local RSSHub
        run: |
          docker run -d --name rsshub -p 1200:1200 diygod/rsshub:chromium-bundled
          for i in $(seq 1 30); do
            if curl -s http://localhost:1200 > /dev/null 2>&1; then
              echo "RSSHub is ready"
              break
            fi
            echo "Waiting for RSSHub to start... ($i/30)"
            sleep 2
          done

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: node src/main.js
        env:
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          RSSHUB_BASE_URL: http://localhost:1200

      - name: Commit new article
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/
          git diff --staged --quiet || git commit -m "自动生成宠物健康文章 $(date +%Y-%m-%d)"
          git push